name: ci

# Path-filtered CI skeleton.
#
# Every gate below is a PASSING NO-OP for now — the real commands land as features do.
# The `changes` job computes which parts of the monorepo a PR touched, and each gate
# runs ONLY for the relevant paths (backend changes run backend gates, etc.), so an
# unrelated change doesn't pay for every gate.
#
# NOTE: making these gates *required* for merge needs branch protection on `main`,
# which is configured on GitHub (out of scope for the initial local scaffold).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas changed so downstream gates can path-filter themselves.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      adapters: ${{ steps.filter.outputs.adapters }}
      client: ${{ steps.filter.outputs.client }}
      lab: ${{ steps.filter.outputs.lab }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            adapters:
              - 'packages/adapters/**'
            client:
              - 'packages/client/**'
            lab:
              - 'lab/**'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Gate 1 — DCO: every commit in the change range must carry a Signed-off-by trailer.
  # ---------------------------------------------------------------------------
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            # push: check the newly pushed commits; fall back to the last commit.
            before="${{ github.event.before }}"
            if [ -n "$before" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
              range="$before..${{ github.sha }}"
            else
              range="HEAD~1..HEAD"
            fi
          fi
          echo "Checking commits in range: $range"
          missing=0
          for sha in $(git rev-list "$range"); do
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer (use git commit -s)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All commits are signed off."

  # ---------------------------------------------------------------------------
  # Gate 2 — Lint (ruff/black for Python, eslint/prettier for frontend).
  # ---------------------------------------------------------------------------
  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check backend packages/adapters
      - name: ruff format --check
        run: ruff format --check backend packages/adapters

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: eslint / prettier (stub)
        run: echo "[stub] frontend lint — eslint + prettier --check on frontend/ and packages/client/."

  # ---------------------------------------------------------------------------
  # Gate 3 — Type check (mypy for Python, tsc for TypeScript).
  # ---------------------------------------------------------------------------
  backend-types:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy + typed deps
        run: pip install mypy pydantic types-PyYAML fastapi
      - name: mypy (strict)
        run: mypy backend/app packages/adapters/src/provx_sdk

  frontend-types:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: tsc (stub)
        run: echo "[stub] frontend types — tsc --noEmit on frontend/ and packages/client/."

  # ---------------------------------------------------------------------------
  # Gate 4 — Unit + parser fixtures. Runs the Finding-model and playbook-loader tests.
  # (Real gate. lint/types remain stubs, so ruff/mypy don't run here yet.)
  # ---------------------------------------------------------------------------
  unit-fixtures:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true' || needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pydantic pyyaml pytest
      - name: Run unit + fixture tests
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Gate 5 — Accuracy harness: score TP/FP/FN vs lab/expected.yml; fail on new FP/FN.
  # ---------------------------------------------------------------------------
  accuracy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true' || needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: accuracy gate (stub)
        run: echo "[stub] accuracy — score checks vs lab/expected.yml (TP/FP/FN); fail new false positives or regressions. Green on an empty ruleset."

  # ---------------------------------------------------------------------------
  # Gate 6 — Secret scanning + dependency & license audit. Runs on every PR.
  # ---------------------------------------------------------------------------
  secrets-deps:
    runs-on: ubuntu-latest
    steps:
      - name: gitleaks / pip-audit / npm audit / license check (stub)
        run: echo "[stub] secrets-deps — gitleaks on diff, pip-audit + npm audit, and an SPDX license-compatibility check."
