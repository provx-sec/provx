name: ci

# Path-filtered CI skeleton.
#
# Some gates are real, some are still stubs; the remaining stubs become real as features land.
#   Real now: dco, backend-lint (ruff), backend-types (mypy), unit-fixtures (pytest),
#     frontend-types (tsc), accuracy (TP/FP/FN vs the lab targets).
#   Still stubs (passing no-ops): frontend-lint, secrets-deps.
# The `changes` job computes which parts of the monorepo a PR touched, and each gate
# runs ONLY for the relevant paths (backend changes run backend gates, etc.), so an
# unrelated change doesn't pay for every gate.
#
# NOTE: making these gates *required* for merge needs branch protection on `main`,
# which is configured on GitHub (out of scope for the initial local scaffold).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which areas changed so downstream gates can path-filter themselves.
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      adapters: ${{ steps.filter.outputs.adapters }}
      client: ${{ steps.filter.outputs.client }}
      lab: ${{ steps.filter.outputs.lab }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            adapters:
              - 'packages/adapters/**'
            client:
              - 'packages/client/**'
            lab:
              - 'lab/**'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # Gate 1 - DCO: every commit in the change range must carry a Signed-off-by trailer.
  # ---------------------------------------------------------------------------
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            # push: check the newly pushed commits; fall back to the last commit.
            before="${{ github.event.before }}"
            if [ -n "$before" ] && git cat-file -e "$before^{commit}" 2>/dev/null; then
              range="$before..${{ github.sha }}"
            else
              range="HEAD~1..HEAD"
            fi
          fi
          echo "Checking commits in range: $range"
          missing=0
          for sha in $(git rev-list "$range"); do
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by trailer (use git commit -s)"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then exit 1; fi
          echo "All commits are signed off."

  # ---------------------------------------------------------------------------
  # Gate 2 - Lint (ruff/black for Python, eslint/prettier for frontend).
  # ---------------------------------------------------------------------------
  backend-lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check backend packages/adapters lab
      - name: ruff format --check
        run: ruff format --check backend packages/adapters lab

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: eslint / prettier (stub)
        run: echo "[stub] frontend lint - eslint + prettier --check on frontend/ and packages/client/."

  # ---------------------------------------------------------------------------
  # Gate 3 - Type check (mypy for Python, tsc for TypeScript).
  # ---------------------------------------------------------------------------
  backend-types:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # mypy needs the real runtime deps installed to resolve types through them; the
      # backend lock plus the SDK is the same set the image gets.
      - name: Install mypy + typed deps
        run: |
          pip install -r backend/requirements.lock
          pip install --no-deps ./packages/adapters
          pip install mypy types-PyYAML
      - name: mypy (strict)
        run: mypy backend/app packages/adapters/src/provx_sdk lab

  frontend-types:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: tsc --noEmit
        working-directory: frontend
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Gate 4 - Unit + fixture tests: the Finding model, playbook loader, adapter fixtures,
  # scope enforcement, the API, migrations, and the accuracy scorer.
  # (Real gate. Backend ruff/mypy run as their own real gates, see backend-lint and
  # backend-types above; only frontend-lint and secrets-deps remain stubs.)
  # ---------------------------------------------------------------------------
  unit-fixtures:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true' || needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The SDK is installed (not just on PYTHONPATH) so entry-point adapter discovery
      # resolves the same way it does at runtime.
      - name: Install test dependencies
        run: |
          pip install -r backend/requirements.lock
          pip install ./packages/adapters
          pip install pytest pytest-asyncio
      - name: Run unit + fixture tests
        env:
          APP_ENV: testing
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Gate 5 - Accuracy harness: score TP/FP/FN vs lab/expected.yml; fail on new FP/FN.
  # ---------------------------------------------------------------------------
  accuracy:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.adapters == 'true' || needs.changes.outputs.lab == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Brings up the lab targets and scores the adapter against each target's
      # expected.yml. Any false positive on the clean target, or any missed known issue,
      # fails the build.
      - name: Score accuracy against the lab targets
        run: make accuracy

  # ---------------------------------------------------------------------------
  # Gate 6 - Secret scanning + dependency & license audit. Runs on every PR.
  # ---------------------------------------------------------------------------
  secrets-deps:
    runs-on: ubuntu-latest
    steps:
      - name: gitleaks / pip-audit / npm audit / license check (stub)
        run: echo "[stub] secrets-deps - gitleaks on diff, pip-audit + npm audit, and an SPDX license-compatibility check enforcing PX-FREE (free/OSS Apache-compatible deps only) once real dependencies exist."

  # ---------------------------------------------------------------------------
  # The single required check for branch protection. Runs unconditionally so the
  # path-filtered gates above still yield a status when they skip - GitHub never
  # reports on a skipped job, so requiring them directly leaves a docs-only PR
  # waiting on a check that will never arrive. Skipped counts as OK; only a real
  # failure or a cancellation blocks the merge.
  # ---------------------------------------------------------------------------
  ci-required:
    if: always()
    needs: [dco, backend-lint, backend-types, unit-fixtures, accuracy]
    runs-on: ubuntu-latest
    steps:
      - name: Assert no upstream gate failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "gate results: $results"
          for r in $results; do
            case "$r" in
              failure|cancelled) echo "::error::a required gate reported $r"; exit 1 ;;
            esac
          done
