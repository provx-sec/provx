# Root ruff config for the Provx monorepo. Applies to any Python file that doesn't have a
# nearer config (e.g. packages/). backend/pyproject.toml carries the same settings so both
# trees lint and format identically.
target-version = "py312"
line-length = 100

[lint]
select = ["E", "F", "I", "UP", "B"]

[lint.flake8-bugbear]
# FastAPI's dependency-injection idiom puts Depends()/Query() calls in argument defaults;
# that is the documented pattern, not the mutable-default bug B008 targets.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Body"]
