# Provx label taxonomy - the single source of truth for repository labels.
#
# Format is compatible with label-sync tooling (e.g. crazy-max/ghaction-github-labeler
# or github-label-sync). Each entry: name, color (hex, no '#'), description.
# Keep this file in sync with the categories in docs/PROJECT_SETUP_PLAYBOOK.md A7.

# --- Type: what kind of work is this? -----------------------------------------
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working as intended"
- name: "type:feature"
  color: "0e8a16"
  description: "New capability or improvement"
- name: "type:adapter"
  color: "1d76db"
  description: "New tool adapter or detection use-case"
- name: "type:use-case"
  color: "1d76db"
  description: "New detection/methodology use-case"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:chore"
  color: "cfd3d7"
  description: "Maintenance, tooling, or housekeeping"

# --- Area: which part of the platform? ----------------------------------------
- name: "area:core"
  color: "5319e7"
  description: "Core: scope engine, orchestration, findings pipeline"
- name: "area:web"
  color: "5319e7"
  description: "Web pentest module"
- name: "area:api"
  color: "5319e7"
  description: "API pentest module"
- name: "area:infra"
  color: "5319e7"
  description: "Infrastructure / Active Directory module"
- name: "area:ai"
  color: "5319e7"
  description: "AI analyst / autopilot / provider abstraction"
- name: "area:report"
  color: "5319e7"
  description: "Reporting engine and templates"
- name: "area:platform-sec"
  color: "5319e7"
  description: "RBAC, secrets, audit log - Provx's own security"
- name: "area:docs"
  color: "5319e7"
  description: "Documentation and contributor on-ramp"
- name: "area:ci"
  color: "5319e7"
  description: "CI, build, and release tooling"

# --- Priority -----------------------------------------------------------------
- name: "priority:P0"
  color: "b60205"
  description: "Critical - drop everything"
- name: "priority:P1"
  color: "d93f0b"
  description: "High"
- name: "priority:P2"
  color: "fbca04"
  description: "Medium"
- name: "priority:P3"
  color: "c2e0c6"
  description: "Low / nice to have"

# --- Workflow & quality gates -------------------------------------------------
- name: "good-first-issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help-wanted"
  color: "008672"
  description: "Extra attention is welcome"
- name: "needs-fixture"
  color: "fbca04"
  description: "Missing the required test fixture (raw output → expected findings)"
- name: "needs-accuracy-review"
  color: "d93f0b"
  description: "Accuracy gate / CODEOWNER must confirm TP/FP/FN"
- name: "safety-review"
  color: "b60205"
  description: "Touches the intrusive/exploit path - safety review required"
- name: "blocked"
  color: "000000"
  description: "Blocked on another issue or external dependency"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or PR already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
