# Root pytest config for the Provx monorepo.
# Makes the backend app and the adapters SDK importable without installing them, and
# collects both test suites in one run (mirrors the CI `unit-fixtures` gate).
[pytest]
pythonpath =
    .
    backend
    packages/adapters/src
testpaths =
    backend/tests
    packages/adapters/tests
    lab/tests
# pytest-asyncio drives the async service-level tests without a per-test decorator.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
