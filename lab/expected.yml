# Provx accuracy manifest — the oracle the accuracy gate scores against.
#
# The accuracy harness runs Provx's checks against the lab targets and compares results
# to this manifest, scoring True Positives / False Positives / False Negatives. A PR that
# adds a false positive on a clean target, or misses a known vuln, fails the gate.
# See docs/VALIDATION_and_REFERENCE_SYSTEMS.md and docs/START_HERE_Master_Checklist.md §2.
#
# Status: placeholder with an EMPTY ruleset. With no checks yet, the harness is green by
# definition (GATE 2: "runs green on an empty ruleset"). Targets + expectations are added
# in Phase 2, before the first real check.

version: 1

# Deliberately-vulnerable targets — each lists the findings that SHOULD be detected.
positive: []
# Example (Phase 2):
# positive:
#   - target: juice-shop
#     expect:
#       - id: security_headers
#         min_severity: low

# Known-clean baselines — must produce ZERO findings (the false-positive tripwire).
negative: []
# Example (Phase 2):
# negative:
#   - target: clean-static-site
#     expect_none: true
