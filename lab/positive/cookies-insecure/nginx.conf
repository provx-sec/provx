# Deliberately-insecure cookie baseline for the `cookie_flags` adapter. Sets a session cookie
# with none of the protective attributes (Secure, HttpOnly, SameSite), so all three checks fire.
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Set-Cookie "sid=abc123; Path=/" always;
    }
}
