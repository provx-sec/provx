# Deliberately-incomplete disclosure baseline for the `wellknown` adapter. Serves a normal
# site but publishes no /.well-known/security.txt, so a request for it 404s and the
# security-txt-missing check fires.
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
