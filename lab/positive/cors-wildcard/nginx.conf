# Deliberately-permissive CORS baseline for the `cors` adapter. Returns a wildcard
# Access-Control-Allow-Origin on every response, so the wildcard-origin check fires.
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Access-Control-Allow-Origin "*" always;
    }
}
