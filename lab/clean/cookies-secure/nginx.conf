# Clean cookie baseline for the `cookie_flags` adapter - the false-positive tripwire. The
# session cookie carries Secure, HttpOnly, and SameSite, so no cookie check fires.
server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Set-Cookie "sid=abc123; Path=/; Secure; HttpOnly; SameSite=Strict" always;
    }
}
