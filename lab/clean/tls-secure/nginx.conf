# Clean transport baseline for the `tls` adapter - the false-positive tripwire. It sends
# HSTS and redirects every HTTP request to HTTPS, so neither transport-hygiene check fires.
# `always` keeps the HSTS header on the 301 the adapter inspects. The adapter does not follow
# the redirect, so no TLS listener is needed here; certificate checks are covered by fixtures.
server {
    listen 80;
    server_name _;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    return 301 https://$host$request_uri;
}
