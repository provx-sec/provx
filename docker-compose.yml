# Provx - one-command local bring-up.
#
# Each application service builds and runs independently from its own Dockerfile
# (`backend/`, `frontend/`); `db` and `redis` use official images. Copy `.env.example`
# to `.env` before running: `cp .env.example .env && docker compose up --build`.

services:
  backend:
    # Root context: the image installs provx-sdk from packages/adapters alongside the app.
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: provx-backend
    env_file: [.env]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      SAFE_MODE: ${SAFE_MODE}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Declared here as well as in the Dockerfile: the frontend gates its own start on
    # `service_healthy`, and that ordering must not depend on an image detail.
    healthcheck:
      test:
        ["CMD", "python", "-c",
         "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks: [default, lab]
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: provx-frontend
    # The web tier needs only the API base URL; it must not receive backend secrets
    # (SECRET_KEY, DATABASE_URL, POSTGRES_PASSWORD). No env_file here on purpose.
    environment:
      PROVX_API_BASE_URL: ${PROVX_API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Accuracy-gate targets. Behind the `lab` profile so a normal `docker compose up` never
  # starts them, and on an internal-only network with no published ports - these exist for
  # authorized, self-contained testing only (see lab/RESPONSIBLE_USE context in lab/README.md).
  lab-missing-headers:
    profiles: [lab]
    image: nginx:1.27-alpine
    volumes:
      - ./lab/positive/missing-headers/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./lab/positive/missing-headers/index.html:/usr/share/nginx/html/index.html:ro
    networks: [lab]
    restart: unless-stopped

  lab-hardened:
    profiles: [lab]
    image: nginx:1.27-alpine
    volumes:
      - ./lab/clean/hardened/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./lab/clean/hardened/index.html:/usr/share/nginx/html/index.html:ro
    networks: [lab]
    restart: unless-stopped

  # The accuracy gate itself. Runs on the internal lab network because that is the only
  # place the targets are reachable from - they publish no ports to the host.
  accuracy:
    profiles: [lab]
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: provx-backend
    entrypoint: ["python", "/app/lab/harness.py"]
    volumes:
      - ./lab:/app/lab:ro
    depends_on: [lab-missing-headers, lab-hardened]
    networks: [lab]

networks:
  default:
  lab:
    internal: true

volumes:
  pgdata:
